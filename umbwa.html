<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>University Registration</title>
</head>
<body>

    <header>
        <h1>MYRON ROLLE UNIVERSITY</h1>
        <p>Registration Form (First-Year)</p>
    </header>

    <form action="/submit-registration" method="POST">
        <header>
        <section>
            <div>
                <label for="fname">First Name:</label>
                <input type="text" id="fname" name="firstname" placeholder="e.g. Joe">
            </div>
            <div>
                <label for="mname">Middle Name:</label>
                <input type="text" id="mname" name="middlename" placeholder="e.g. Smith">
            </div>
            <div>
                <label for="lname">Last/Surname:</label>
                <input type="text" id="lname" name="lastname" placeholder="e.g. Grey">
            </div>
            
            <div>
                <label for="dob">Date of Birth:</label>
                <input type="date" id="dob" name="birthdate">
            </div>
            <div>
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" placeholder="e.g. 20">
            </div>
        </section>
</header>
        <section>
            <label>Gender:</label>
            <input type="radio" id="girl" name="gender" value="girl">
            <label for="girl">Girl</label>
            <input type="checkbox" id="male" name="gender" value="male">
            <label for="male">Male</label>
        </section>

        <section>
            <label for="school">SCHOOL:</label>
            <select id="school" name="school">
                <option value="education">Education</option>
                <option value="engineering">Engineering</option>
            </select>

            <label for="dept">Department:</label>
            <select id="dept" name="department">
                <option value="sciences">Sciences</option>
                <option value="arts">Arts</option>
            </select>

            <label for="year">Year of Study:</label>
            <select id="year" name="year_study">
                <option value="1">Year 1</option>
            </select>
        </section>

        <section>
            <div>
                <label for="user">Username:</label>
                <input type="text" id="user" name="username">
            </div>
            <div>
                <label for="pass">Password:</label>
                <input type="password" id="pass" name="password">
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" name="user_email">
            </div>
        </section>

        <section>
            <label for="photo">Upload Passport Photo:</label>
            <input type="file" id="photo" name="passport_photo">
        </section>

        <section>
            <label for="desc">Description:</label><br>
            <textarea id="desc" name="description" rows="5" cols="50"></textarea>
        </section>

        <footer>
            <button type="reset">Cancel</button>
            <button type="submit">Confirm</button>
            <button type="submit">Submit</button>
        </footer>

    </form>
    <table border="1">
    <thead>
        <tr>
            <th colspan="5">KYTOLE UNIVERSITY</th>
        </tr>
        <tr>
            <th>Mon</th>
            <th>Tue</th>
            <th rowspan="2">Practicals</th>
            <th>Wed</th>
            <th>Thu</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>42</td>
            <td>48</td>
            <td>90</td>
            <td>64</td>
        </tr>
        <tr>
            <td rowspan="2">21</td>
            <td rowspan="2">25</td>
            <td>Full Time</td>
            <td rowspan="2">70</td>
            <td rowspan="2">79</td>
        </tr>
        <tr>
            <td>Part Time</td>
        </tr>
    </tbody>
</table>

</body>
</html>
